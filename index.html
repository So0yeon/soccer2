    <script type="text/babel">
const { useState, useReducer, useEffect } = React;

// 배열 랜덤 섞기 함수 (정답 위치 셔플)
const shuffleArray = (array) => {
  const shuffled = [...array];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
};

// 🎵 사운드 시스템
const playSound = (type) => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = ctx.createOscillator();
    const gainNode = ctx.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(ctx.destination);

    if (type === "success") {
      oscillator.frequency.setValueAtTime(523, ctx.currentTime);
      oscillator.frequency.setValueAtTime(784, ctx.currentTime + 0.15);
      gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      oscillator.start(ctx.currentTime);
      oscillator.stop(ctx.currentTime + 0.5);
    } else if (type === "fail") {
      oscillator.frequency.setValueAtTime(300, ctx.currentTime);
      oscillator.frequency.setValueAtTime(200, ctx.currentTime + 0.2);
      oscillator.type = "sawtooth";
      gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      oscillator.start(ctx.currentTime);
      oscillator.stop(ctx.currentTime + 0.4);
    } else if (type === "whistle") {
      oscillator.frequency.setValueAtTime(1200, ctx.currentTime);
      oscillator.frequency.setValueAtTime(900, ctx.currentTime + 0.1);
      oscillator.frequency.setValueAtTime(1200, ctx.currentTime + 0.2);
      gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      oscillator.start(ctx.currentTime);
      oscillator.stop(ctx.currentTime + 0.6);
    }
  } catch (e) {}
};

    { id: "M3", title: "넘어지며 터치", time: "후반 10분", npc: "도윤", npcAvatar: "😈", situation: "공중볼 경합 후 넘어져 땅을 짚으려 뻗은 팔에 공이 맞았습니다!", npcSpeech: "핸드볼!! 고의로 손 썼잖아 심판!!", choices: [ { text: "몸을 지탱하기 위한 자연스러운 동작이었다며 플레이를 이어간다.", correct: true, result: "올바른 판단! 심판이 '플레이 온' 선언.", rule: "몸을 지탱하기 위해 바닥을 짚는 팔에 공이 맞는 것은 핸드볼이 아닙니다.", points: 15, isGoal: false, isFoul: false }, { text: "팔에 맞았으니 스스로 핸드볼 파울을 인정하고 공을 넘겨준다.", correct: false, result: "스스로 파울을 인정해버렸어!", rule: "넘어질 때의 자연스러운 팔은 파울이 아닙니다.", points: -10, isGoal: false, isFoul: false }, { text: "상대가 밀었다고 우기며 오히려 파울을 주장한다.", correct: false, result: "억지스러운 주장은 심판의 반감을 산다.", rule: "자신의 동작이 합법임을 정확히 아는 것이 중요합니다.", points: -5, isGoal: false, isFoul: false } ], commentary: "선수가 넘어질 때 반사적으로 바닥을 짚는 행위가 반칙으로 간주될지 고려해 보세요." },
    { id: "M4", title: "치명적인 역습", time: "후반 42분", npc: "준호", npcAvatar: "🧑‍🦱", situation: "거대한 역습 위기! 상대 에이스가 수비수 없이 단독 질주하려 합니다!", npcSpeech: "이거 뚫리면 끝이야! 막아!!", choices: [ { text: "경고를 감수하고 뒤에서 유니폼을 잡아당겨 역습을 끊는다.", correct: true, result: "경고를 받았지만 팀을 구하는 전술적 파울!", rule: "유망한 공격 기회 저지(SPA)는 옐로카드지만, 팀을 위한 선택일 수 있습니다.", points: 10, isGoal: false, isFoul: true, card: "yellow" }, { text: "다치게 할 작정으로 뒤에서 발목을 향해 거칠게 태클한다.", correct: false, result: "심각한 파울! 즉시 퇴장!", rule: "백태클은 다이렉트 퇴장 사유입니다.", points: -20, isGoal: false, isFoul: true, card: "red" }, { text: "페어플레이를 위해 아무런 터치 없이 끝까지 쫓아가기만 한다.", correct: false, result: "그대로 돌파당해 실점하고 말았다.", rule: "때로는 규칙 안에서 벌을 감수하는 전술도 필요합니다.", points: -15, isGoal: false, isFoul: false } ], commentary: "팀을 구하는 반칙과 상대를 다치게 하는 폭력적인 반칙의 차이를 구별해 보세요." },
    { id: "M5", title: "진로 방해 (임피딩)", time: "연장전", npc: "도윤", npcAvatar: "😈", situation: "공이 라인 밖으로 나가는 걸 지키기 위해, 공이 1미터 내에 있을 때 상대의 길을 몸으로 막았습니다.", npcSpeech: "공도 안 만지면서 길막하지 마!!", choices: [ { text: "공이 플레이 가능한 거리에 있으므로 정당한 스크린 플레이를 유지한다.", correct: true, result: "합법적인 스크린 플레이! 골킥을 얻어냄.", rule: "공이 플레이 가능 거리에 있다면 진로를 막는 스크린 플레이는 합법입니다.", points: 15, isGoal: false, isFoul: false }, { text: "직접 공을 건드리지 않았으므로 반칙이라 생각하고 비켜준다.", correct: false, result: "어이없이 공을 뺏겨버렸다.", rule: "거리가 가깝다면 몸으로 길을 막을 권리가 있습니다.", points: -10, isGoal: false, isFoul: false }, { text: "상대를 팔꿈치로 밀쳐내며 확실하게 진로를 차단한다.", correct: false, result: "파울! 지나친 신체 사용은 금물.", rule: "스크린은 허용되지만 공격적인 밀치기는 파울입니다.", points: -15, isGoal: false, isFoul: true } ], commentary: "공을 보호하려는 행위가 합법이 되기 위한 '거리의 조건'을 생각해 보세요." },
    { id: "M6", title: "어드밴티지 룰", time: "전반 25분", npc: "준호", npcAvatar: "🧑‍🦱", situation: "당신이 거친 태클을 당해 휘청였지만 안 넘어지고 공을 유지하며 완벽한 패스길을 열었습니다.", npcSpeech: "나한테 패스해! 나 완전 빈 공간!", choices: [ { text: "주저앉지 않고 균형을 유지하며 동료에게 패스를 연결한다.", correct: true, result: "주심이 어드밴티지 선언! 골 찬스!", rule: "파울을 당했어도 플레이를 계속하는 게 유리하면 심판은 경기를 멈추지 않습니다.", points: 15, isGoal: true, isFoul: false }, { text: "반칙을 당했으니 제자리에 멈춰 서서 프리킥을 요구한다.", correct: false, result: "공격 템포가 완전히 죽어버렸어.", rule: "쓰러지지 않고 공격을 이어가는 것이 더 무서운 플레이입니다.", points: -10, isGoal: false, isFoul: false }, { text: "태클한 선수에게 달려가 왜 거칠게 하냐며 언쟁을 벌인다.", correct: false, result: "완벽한 역습 찬스를 감정 싸움으로 날렸다.", rule: "멈추지 않는 공격이 최고의 복수입니다.", points: -15, isGoal: false, isFoul: false } ], commentary: "반칙을 당했을 때 멈추는 것과 계속 플레이하는 것 중 어느 쪽이 팀에 이득일지 판단해 보세요." },
    { id: "M7", title: "장비 점검", time: "전반 시작 전", npc: "도윤", npcAvatar: "😈", situation: "경기가 시작되려는데, 당신이 답답하다며 정강이 보호대(신가드)를 빼려 합니다.", npcSpeech: "그거 빼도 심판 모를걸? 훨씬 편해.", choices: [ { text: "선수의 안전을 위한 규정이므로 묵묵히 착용하고 경기에 임한다.", correct: true, result: "룰 준수. 심판의 장비 검사를 무사 통과!", rule: "정강이 보호대는 모든 축구 선수의 필수 기본 장비입니다. 미착용 시 출전 불가입니다.", points: 15, isGoal: false, isFoul: false }, { text: "심판 몰래 정강이 보호대를 빼서 던져버리고 양말만 올린다.", correct: false, result: "심판에게 걸려 경기장 밖으로 쫓겨남!", rule: "장비 규정 위반은 부상 위험이 커 엄격히 금지됩니다.", points: -15, isGoal: false, isFoul: true }, { text: "종이 상자를 잘라 대충 정강이에 끼워 넣는다.", correct: false, result: "규격에 맞지 않는 보호대는 허용되지 않는다.", rule: "적절한 재질의 정강이 보호대여야 합니다.", points: -10, isGoal: false, isFoul: false } ], commentary: "경기장에서 선수 자신을 보호하기 위해 절대 타협할 수 없는 장비가 무엇인지 떠올려 보세요." },
    { id: "M8", title: "드롭볼 상황", time: "후반 12분", npc: "준호", npcAvatar: "🧑‍🦱", situation: "관중석에서 이물질이 날아와 주심이 경기를 멈췄습니다. 당시 공은 당신 발밑에 있었습니다. 재개 방법은?", npcSpeech: "경합해서 다시 뺏어야 되나?", choices: [ { text: "중단 당시 공을 가졌던 내가 주심이 떨어뜨려 주는 공을 독점해서 받는다.", correct: true, result: "드롭볼 룰을 정확히 숙지! 소유권을 유지함.", rule: "중단 당시 마지막으로 공을 터치한 팀의 선수 1명에게만 주심이 공을 떨어뜨려 줍니다.", points: 15, isGoal: false, isFoul: false }, { text: "상대 선수와 마주 서서 심판이 공을 떨어뜨리면 뺏기 위해 경합한다.", correct: false, result: "구시대 룰! 심판이 뒤로 물러나라고 지시함.", rule: "2019년 룰 개정으로 경합 드롭볼은 사라졌습니다.", points: -10, isGoal: false, isFoul: false }, { text: "아무렇게나 공을 잡아서 동료에게 손으로 던져준다.", correct: false, result: "파울! 주심이 재개해야 한다.", rule: "선수가 마음대로 재개할 수 없습니다.", points: -10, isGoal: false, isFoul: true } ], commentary: "경기가 중단되기 직전에 누가 공을 가지고 있었는지가 가장 중요합니다." },
    { id: "M9", title: "교체 룰", time: "후반 30분", npc: "준호", npcAvatar: "🧑‍🦱", situation: "감독님이 당신을 교체시키려 합니다. 당신은 벤치가 있는 반대편 터치라인 근처에 있습니다.", npcSpeech: "수고했어! 얼른 벤치 쪽으로 와서 교체해!", choices: [ { text: "시간을 지연시키지 않기 위해 현재 위치에서 가장 가까운 라인 밖으로 즉시 나간다.", correct: true, result: "지연 없이 빠르게 교체 아웃. 팬들의 박수!", rule: "교체되는 선수는 시간 지연을 막기 위해 벤치가 아니더라도 가장 가까운 경계선으로 나가야 합니다.", points: 15, isGoal: false, isFoul: false }, { text: "동료들과 일일이 인사를 나누며 벤치가 있는 곳까지 천천히 걸어간다.", correct: false, result: "시간 지연 행위로 경고를 받음!", rule: "불필요한 시간 끌기는 경고 대상입니다.", points: -15, isGoal: false, isFoul: true, card: "yellow" }, { text: "교체되기 싫다며 경기장 중앙에 주저앉아 버린다.", correct: false, result: "심각한 비신사적 행위로 카드 누적 퇴장!", rule: "감독과 심판 지시 불응은 큰 징계를 받습니다.", points: -20, isGoal: false, isFoul: true, card: "yellow" } ], commentary: "교체를 할 때 불필요한 시간 낭비를 막기 위한 최선의 이동 경로를 생각해 보세요." },
    { id: "M10", title: "판정 항의", time: "후반 38분", npc: "도윤", npcAvatar: "😈", situation: "명백한 상대 파울인데 심판이 불지 않았습니다. 주장도 아닌 당신이 심판에게 거칠게 항의하려 합니다.", npcSpeech: "같이 가서 엎어버리자! 심판 눈 삐었냐고!", choices: [ { text: "감정을 억누르고 재빨리 수비 위치로 복귀해 다음 상황에 대비한다.", correct: true, result: "냉정한 판단! 항의 대신 수비 복귀로 위기 탈출.", rule: "지속적/거친 항의(Dissent)는 경고 대상이며, 최근엔 주장만 소통하도록 권장됩니다.", points: 15, isGoal: false, isFoul: false }, { text: "심판에게 손가락질하며 거친 언사로 격렬하게 따진다.", correct: false, result: "판정 항의(Dissent)로 옐로카드!", rule: "언행으로 판정에 항의하면 옐로카드입니다.", points: -15, isGoal: false, isFoul: true, card: "yellow" }, { text: "경기를 보이콧하겠다며 공을 관중석으로 차버린다.", correct: false, result: "다이렉트 퇴장! 팀을 나락으로 빠뜨렸다.", rule: "극단적인 비신사적 행위는 용납되지 않습니다.", points: -25, isGoal: false, isFoul: true, card: "red" } ], commentary: "판정에 불만이 있을 때 선수가 취할 수 있는 가장 이성적인 행동이 무엇일지 고민해 보세요." },
    { id: "M11", title: "골 세리머니", time: "연장 후반", npc: "준호", npcAvatar: "🧑‍🦱", situation: "당신이 극적인 결승골을 넣었습니다!! 너무 기뻐서 유니폼 상의를 벗고 환호하려 합니다.", npcSpeech: "와아아아!! 다 벗고 뛰자!!!", choices: [ { text: "기쁨을 표현하되 유니폼 상의를 머리 위로 벗지는 않는다.", correct: true, result: "멋진 세리머니를 하고 불필요한 경고도 피함!", rule: "득점 후 유니폼 상의를 머리 위로 벗는 행위는 무조건 옐로카드입니다.", points: 15, isGoal: false, isFoul: false }, { text: "흥분을 주체하지 못하고 유니폼 상의를 완전히 벗어 관중석에 던진다.", correct: false, result: "경고! 이미 카드가 있었다면 퇴장당할 뻔!", rule: "과도한 골 세리머니(상의 탈의)는 경고 대상입니다.", points: -15, isGoal: false, isFoul: true, card: "yellow" }, { text: "관중석 철망을 타고 높이 올라가 포효한다.", correct: false, result: "안전 문제로 철망에 오르는 것도 경고 대상이다.", rule: "주변 안전을 위협하는 세리머니는 제재를 받습니다.", points: -15, isGoal: false, isFoul: true, card: "yellow" } ], commentary: "아무리 득점의 기쁨이 크더라도, 선수가 지켜야 할 복장 규정이 존재합니다." },
    { id: "M12", title: "벽 방해", time: "후반 40분", npc: "도윤", npcAvatar: "😈", situation: "우리 팀의 프리킥 찬스! 상대 수비 4명이 벽을 세웠습니다. 당신이 벽의 시야를 가리기 위해 접근하려 합니다.", npcSpeech: "내가 벽 사이에 껴서 시야 다 가릴게!", choices: [ { text: "상대 수비 벽으로부터 최소 1미터 이상 떨어져 자리를 잡는다.", correct: true, result: "규정 준수! 방해 없이 프리킥 전개.", rule: "수비 벽이 3명 이상일 때, 공격수는 그 벽으로부터 최소 1미터 떨어져 있어야 합니다.", points: 15, isGoal: false, isFoul: false }, { text: "상대 수비 벽 사이를 파고들어 어깨로 밀어내며 자리를 차지한다.", correct: false, result: "삐익! 간접 프리킥 헌납! 공격자 파울!", rule: "1미터 거리 유지 규정을 어기면 간접 프리킥 파울입니다.", points: -15, isGoal: false, isFoul: true }, { text: "수비수들 바로 코앞에 바짝 붙어 시야를 완전히 차단한다.", correct: false, result: "거리 규정 위반으로 반칙이 선언되었다.", rule: "벽 주변에서의 공격수 방해 행위는 엄격히 금지됩니다.", points: -10, isGoal: false, isFoul: true } ], commentary: "수비수들이 정당하게 세운 벽 주변에서 공격수가 지켜야 할 안전 거리가 있습니다." },
    { id: "M13", title: "킥오프 룰", time: "경기 시작", npc: "준호", npcAvatar: "🧑‍🦱", situation: "킥오프 시간입니다. 옛날엔 두 명이 공을 터치하며 시작했지만, 규칙이 바뀌었습니다.", npcSpeech: "내가 툭 쳐줄 테니까 네가 뒤로 돌려!", choices: [ { text: "최신 규정에 따라 혼자서 공을 바로 뒤로 차며 경기를 시작한다.", correct: true, result: "최신 룰 반영! 매끄러운 경기 시작.", rule: "과거와 달리 킥오프 볼은 뒤로 포함해 어떤 방향으로든 차낼 수 있어 한 명이 처리 가능합니다.", points: 15, isGoal: false, isFoul: false }, { text: "무조건 공을 앞으로 먼저 굴려야 한다고 동료에게 주장한다.", correct: false, result: "옛날 축구 규칙을 기억하고 있어...", rule: "킥오프는 후방 패스로도 바로 시작할 수 있습니다.", points: -10, isGoal: false, isFoul: false }, { text: "호루라기가 울리자마자 손으로 공을 집어 동료에게 던져준다.", correct: false, result: "핸드볼 파울! 킥오프는 반드시 발로 해야 한다.", rule: "경기의 시작은 킥(발)으로 이루어져야 합니다.", points: -15, isGoal: false, isFoul: true } ], commentary: "과거와 달리 경기를 시작하는 방향에 제약이 사라졌다는 점을 활용해 보세요." }

// ⚙️ 상태 관리 (Reducer)
// =============================================
const GAME_LENGTH = 9; 

const initialState = {
  playerName: "",
  playerPosition: null,
  time: 0,
  score: { player: 0, opponent: 0 },
  cards: { yellow: 0, red: 0 },
  understandingScore: 0,
  currentEvent: null,
  eventCount: 0,
  gamePhase: "intro", // intro, game, result, ending
  lastResult: null,
  eventHistory: [],
  usedEventIds: [],
};

function gameReducer(state, action) {
  switch (action.type) {
    case "SET_NAME": return { ...state, playerName: action.payload };
    case "SET_POSITION": return { ...state, playerPosition: action.payload };

    case "START_GAME": {
      const pos = action.payload.position;
      const pool = EVENTS[pos];
      const firstEventRaw = pool[Math.floor(Math.random() * pool.length)];
      
      // 문제 선지 셔플
      const firstEvent = { ...firstEventRaw, choices: shuffleArray(firstEventRaw.choices) };
      
      return {
        ...state, playerPosition: pos, gamePhase: "game", currentEvent: firstEvent,
        usedEventIds: [firstEvent.id], eventCount: 1, time: 5, score: { player: 0, opponent: 0 },
        cards: { yellow: 0, red: 0 }, understandingScore: 0, eventHistory: [],
      };
    }

    case "CHOOSE_ANSWER": {
      const choice = action.payload;
      const newCards = { ...state.cards };
      if (choice.card === "yellow") newCards.yellow += 1;
      if (choice.card === "red") newCards.red += 1;

      const newScore = { ...state.score };
      if (choice.isGoal) newScore.player += 1;
      if (!choice.correct && Math.random() < 0.4) newScore.opponent += 1; 

      const newUnderstanding = Math.max(0, Math.min(100, state.understandingScore + choice.points));
      const historyEntry = { event: state.currentEvent.title, correct: choice.correct, rule: choice.rule };

      return {
        ...state, cards: newCards, score: newScore, understandingScore: newUnderstanding,
        time: state.time + 10, lastResult: choice, eventHistory: [...state.eventHistory, historyEntry],
        gamePhase: "result",
      };
    }

    case "NEXT_EVENT": {
      if (state.eventCount >= GAME_LENGTH) {
        return { ...state, gamePhase: "ending" };
      }
      
      const pool = EVENTS[state.playerPosition];
      const unused = pool.filter((e) => !state.usedEventIds.includes(e.id));
      if (unused.length === 0) return { ...state, gamePhase: "ending" };
      
      const nextEventRaw = unused[Math.floor(Math.random() * unused.length)];
      const nextEvent = { ...nextEventRaw, choices: shuffleArray(nextEventRaw.choices) };

      return {
        ...state, currentEvent: nextEvent, usedEventIds: [...state.usedEventIds, nextEvent.id],
        eventCount: state.eventCount + 1, lastResult: null, gamePhase: "game",
      };
    }

    case "RESTART": return { ...initialState, playerName: state.playerName, playerPosition: state.playerPosition };
    default: return state;
  }
}

// =============================================
// 🏆 엔딩 계산 로직 
// =============================================
function getEnding(state) {
  const { cards, eventHistory } = state;
  const correctCount = eventHistory.filter((e) => e.correct).length;
  const foulCount = eventHistory.filter((e) => !e.correct).length;

  if (cards.red >= 1 || (cards.yellow >= 2 && foulCount >= 4)) {
    return {
      type: "chaos", title: "반칙단 입단", subtitle: "퇴장! 질서가 무너졌다", emoji: "🟥", sound: "whistle",
      description: "거친 플레이와 룰 무지로 인해 팀이 패배했습니다. 반칙단이 당신을 환영합니다.",
      npc: "도윤", npcAvatar: "😈", npcSpeech: "크크크! 우리 팀 유니폼이 잘 어울리겠어!",
      bg: "from-red-950 via-red-900 to-black", textColor: "text-red-200", accentColor: "text-red-500",
    };
  }

  if (correctCount === GAME_LENGTH) {
    return {
      type: "master", title: "전설의 룰 마스터", subtitle: "오차 없는 완벽한 판정!", emoji: "👑", sound: "success",
      description: `단 하나의 실수도 용납하지 않는 완벽함! ${state.playerName}, 당신이 진정한 그라운드의 지배자입니다!`,
      npc: "준호", npcAvatar: "🧑‍🦱", npcSpeech: "와, 너 진짜 축구 심판 해도 되겠다. 완벽해!",
      bg: "from-yellow-700 via-amber-500 to-orange-600", textColor: "text-yellow-50", accentColor: "text-yellow-200",
    };
  }

  if (correctCount >= 7) {
    return {
      type: "veteran", title: "베테랑 지배자", subtitle: "든든한 팀의 기둥", emoji: "🛡️", sound: "success",
      description: "사소한 실수 하나를 제외하면 흠잡을 데 없는 지식입니다. 다음번엔 마스터에 도전하세요!",
      npc: "준호", npcAvatar: "🧑‍🦱", npcSpeech: "역시 네가 있어서 든든해! 다음엔 만점 가자!",
      bg: "from-emerald-900 via-green-800 to-teal-900", textColor: "text-green-100", accentColor: "text-green-400",
    };
  }

  if (correctCount >= 4) {
    return {
      type: "rookie", title: "성장하는 유망주", subtitle: "기본기는 합격점", emoji: "🏃", sound: "success",
      description: "규칙을 어느 정도 이해하고 있지만 아쉬운 오판이 팀을 위기로 몰아넣기도 했습니다.",
      npc: "준호", npcAvatar: "🧑‍🦱", npcSpeech: "괜찮아, 조금만 더 복습하면 훨씬 잘할 거야!",
      bg: "from-blue-900 via-indigo-800 to-violet-900", textColor: "text-blue-100", accentColor: "text-blue-300",
    };
  }

  return {
    type: "bench", title: "벤치 멤버", subtitle: "룰 공부가 시급합니다", emoji: "🤦", sound: "fail",
    description: "잘못된 판단으로 팀의 전술을 망쳤습니다. 당분간 벤치에서 규칙 책을 정독하세요.",
    npc: "감독님", npcAvatar: "👴", npcSpeech: "자네, 축구 룰부터 다시 배우고 오게나.",
    bg: "from-gray-900 via-slate-800 to-black", textColor: "text-gray-300", accentColor: "text-gray-500",
  };
}

// =============================================
// 🎨 백그라운드 (글래스모피즘용)
// =============================================
const PitchBackground = () => (
  <div className="absolute inset-0 z-0 overflow-hidden pointer-events-none opacity-20">
    <div className="absolute top-1/2 left-0 w-full h-[2px] bg-white"></div>
    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 border-[2px] border-white rounded-full"></div>
    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-16 border-[2px] border-t-0 border-white"></div>
    <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-48 h-16 border-[2px] border-b-0 border-white"></div>
  </div>
);

// =============================================
// 📺 화면 1: 인트로
// =============================================
function IntroScreen({ state, dispatch }) {
  const positions = ["FW", "MF", "DF", "GK"];
  const posName = { FW: "공격수", MF: "미드필더", DF: "수비수", GK: "골키퍼" };
  const handleStart = () => {
    if (!state.playerName.trim() || !state.playerPosition) return;
    playSound("whistle");
    dispatch({ type: "START_GAME", payload: { position: state.playerPosition } });
  };

  return (
    <div className="flex flex-col items-center text-white" style={{ animation: "popup 0.6s cubic-bezier(0.16, 1, 0.3, 1)" }}>
      <div className="w-20 h-20 mb-4 bg-white/20 rounded-full flex items-center justify-center text-4xl shadow-inner border border-white/10" style={{ animation: "float 3s ease-in-out infinite" }}>
        ⚽
      </div>
      <h1 className="text-3xl font-extrabold mb-1 tracking-tight text-center drop-shadow-md">
        사커 나이츠
      </h1>
      <p className="text-emerald-300 text-lg font-semibold mb-6 tracking-widest drop-shadow-sm">룰의 지배자[심화]</p>
      
      <div className="w-full space-y-5">
        <div>
          <label className="text-white/70 text-xs font-bold uppercase tracking-wider mb-2 block ml-1">수호자 이름</label>
          <input
            type="text"
            placeholder="선수 닉네임 입력"
            className="w-full bg-black/30 border border-white/20 text-white placeholder-white/40 px-5 py-4 rounded-xl outline-none focus:border-emerald-400 focus:bg-black/50 transition-all font-semibold text-center text-lg shadow-inner"
            value={state.playerName}
            onChange={(e) => dispatch({ type: "SET_NAME", payload: e.target.value })}
          />
        </div>

        <div>
          <label className="text-white/70 text-xs font-bold uppercase tracking-wider mb-2 block ml-1">포지션 선택</label>
          <div className="grid grid-cols-2 gap-3">
            {positions.map(pos => (
              <button key={pos} onClick={() => dispatch({ type: "SET_POSITION", payload: pos })}
                className={`py-3 rounded-xl font-bold transition-all shadow-sm ${state.playerPosition === pos ? 'bg-emerald-600 text-white ring-2 ring-emerald-400 scale-[1.02]' : 'bg-black/30 text-white/60 hover:bg-black/50 border border-white/10'}`}>
                {pos} ({posName[pos]})
              </button>
            ))}
          </div>
        </div>

        <button
          className={`w-full py-4 rounded-xl font-bold text-lg transition-all transform active:scale-95 shadow-lg mt-2
            ${state.playerName.trim() && state.playerPosition 
              ? 'bg-gradient-to-r from-emerald-400 to-green-500 hover:from-emerald-300 hover:to-green-400 text-gray-900 shadow-emerald-500/30' 
              : 'bg-white/10 text-white/30 cursor-not-allowed border border-white/10'}`}
          onClick={handleStart}
          disabled={!state.playerName.trim() || !state.playerPosition}
        >
          그라운드 입장하기
        </button>
      </div>
    </div>
  );
}

// =============================================
// 📺 화면 2: 게임 플레이
// =============================================
function GameScreen({ state, dispatch }) {
  const event = state.currentEvent;
  const [feedback, setFeedback] = useState(null); 

  // NPC 대사에 닉네임 삽입
  const dynamicSpeech = event.npcSpeech.includes(state.playerName) 
      ? event.npcSpeech 
      : `${state.playerName}! ${event.npcSpeech}`;

  const handleChoice = (choice) => {
    if (feedback) return; 

    if (choice.isFoul || choice.card) {
      playSound("whistle");
      setTimeout(() => playSound("card"), 200);
      setFeedback(choice.card || 'yellow');
    } else if (choice.correct) {
      playSound("success");
      setFeedback('correct');
    } else {
      playSound("fail");
      setFeedback('wrong');
    }
    
    if (choice.isGoal) setTimeout(() => playSound("goal"), 100);

    setTimeout(() => {
      setFeedback(null);
      dispatch({ type: "CHOOSE_ANSWER", payload: choice });
    }, 2200); // 2.2초 후 다음(해설화면)으로 넘어감
  };

  return (
    <div className="text-white flex flex-col h-full relative" style={{ animation: "popup 0.4s ease-out" }}>
      {/* 헤더 & 게이지 바 */}
      <div className="flex justify-between items-end mb-3">
        <div>
          <p className="text-white/60 text-[10px] font-bold uppercase tracking-wider mb-1">Understanding</p>
          <p className="font-black text-emerald-400 text-xl">{state.understandingScore}%</p>
        </div>
        <div className="text-center">
          <p className="text-white/60 text-[10px] font-bold uppercase tracking-wider mb-1">Score</p>
          <p className="font-bold text-lg bg-black/40 px-3 py-0.5 rounded-full border border-white/10">
            {state.score.player} <span className="text-white/40 text-sm mx-1">vs</span> <span className="text-red-400">{state.score.opponent}</span>
          </p>
        </div>
        <div className="text-right">
          <p className="text-white/60 text-[10px] font-bold uppercase tracking-wider mb-1">Match</p>
          <p className="font-black text-xl text-white/90">{state.eventCount}<span className="text-sm text-white/40">/9</span></p>
        </div>
      </div>
      
      {/* 이해도 프로그레스 바 */}
      <div className="w-full bg-black/40 h-2.5 rounded-full mb-6 overflow-hidden border border-white/10 shadow-inner">
        <div 
          className="h-full bg-gradient-to-r from-emerald-500 to-green-300 transition-all duration-1000 ease-out rounded-full relative"
          style={{ width: `${state.understandingScore}%` }}
        >
          <div className="absolute inset-0 bg-white/20 w-full" style={{ animation: "float 2s infinite" }}></div>
        </div>
      </div>

      <div className="text-xs font-bold text-emerald-400 mb-2 flex items-center gap-2">
        <span className="bg-emerald-900/50 px-2 py-0.5 rounded border border-emerald-500/30">Q{state.eventCount}</span>
        {event.title}
      </div>

      {/* 상황 영역 */}
      <div className="bg-black/30 p-5 rounded-2xl mb-4 border border-white/10 shadow-inner">
        <p className="text-[15px] leading-relaxed break-keep text-white/90">{event.situation}</p>
      </div>

      {/* NPC 대사 */}
      <div className={`p-4 rounded-xl flex gap-3 shadow-sm mb-5 border ${event.npc === '도윤' ? 'bg-red-950/30 border-red-900/50' : 'bg-emerald-900/20 border-emerald-800/40'}`}>
        <span className="text-3xl drop-shadow-md">{event.npcAvatar}</span>
        <div>
          <div className={`text-[11px] font-bold mb-0.5 uppercase tracking-wider ${event.npc === '도윤' ? 'text-red-400' : 'text-emerald-400'}`}>{event.npc}</div>
          <p className="text-[14px] text-white/90 font-medium break-keep">"{dynamicSpeech}"</p>
        </div>
      </div>

      {/* 선택지 영역 */}
      <div className="space-y-3 relative">
        {event.choices.map((opt, idx) => (
          <button
            key={idx}
            className="w-full text-left bg-white/10 hover:bg-white/20 border border-white/20 p-4 rounded-xl transition-all transform active:scale-95 disabled:opacity-50 flex items-center shadow-sm"
            onClick={() => handleChoice(opt)}
            disabled={feedback !== null}
          >
            <span className="bg-black/30 text-white/60 text-xs font-bold px-2.5 py-1 rounded-md mr-3 shrink-0">{idx + 1}</span>
            <span className="text-[14px] font-medium text-white/95 break-keep leading-snug">{opt.text}</span>
          </button>
        ))}

        {/* 오버레이 피드백 애니메이션 */}
        {feedback && (
          <div className="absolute inset-0 z-20 flex flex-col items-center justify-center bg-[#0b2e13]/90 backdrop-blur-md rounded-2xl p-6" style={{ animation: "popup 0.2s ease-out" }}>
            
            {feedback === 'yellow' && (
              <div className="w-20 h-28 bg-yellow-400 rounded-lg shadow-[0_0_30px_rgba(250,204,21,0.5)] mb-4 border border-yellow-200 flex items-center justify-center text-yellow-900 font-black text-xl" style={{ animation: "cardSmash 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards" }}>
                경고!
              </div>
            )}
            {feedback === 'red' && (
              <div className="w-20 h-28 bg-red-500 rounded-lg shadow-[0_0_30px_rgba(239,68,68,0.5)] mb-4 border border-red-300 flex items-center justify-center text-white font-black text-xl" style={{ animation: "cardSmash 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards" }}>
                퇴장!
              </div>
            )}
            {feedback === 'wrong' && (
              <div className="text-6xl mb-4 drop-shadow-lg" style={{ animation: "popup 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards" }}>❌</div>
            )}
            {feedback === 'correct' && (
              <div className="w-24 h-24 bg-emerald-500 rounded-full shadow-[0_0_30px_rgba(16,185,129,0.5)] mb-4 flex items-center justify-center text-white text-5xl font-black" style={{ animation: "successPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards" }}>
                O
              </div>
            )}

            <h3 className={`text-2xl font-black tracking-tight ${feedback === 'correct' ? 'text-emerald-400' : 'text-red-400'}`}>
              {feedback === 'correct' ? '정답입니다!' : '오답입니다!'}
            </h3>
          </div>
        )}
      </div>
    </div>
  );
}

// =============================================
// 📺 화면 3: 해설 (Result)
// =============================================
function ResultScreen({ state, dispatch }) {
  const result = state.lastResult;
  const isCorrect = result?.correct;

  return (
    <div className="flex flex-col h-full text-white justify-center" style={{ animation: "popup 0.4s ease-out" }}>
      <div className={`p-6 rounded-3xl text-center border shadow-xl mb-6 ${isCorrect ? 'bg-emerald-900/30 border-emerald-500/50' : 'bg-red-950/40 border-red-500/50'}`}>
        <div className="text-6xl mb-4 drop-shadow-xl">{isCorrect ? "🔥" : "❌"}</div>
        <h3 className={`text-lg font-bold break-keep leading-snug ${isCorrect ? 'text-emerald-300' : 'text-red-300'}`}>{result?.result}</h3>
      </div>
      
      <div className="bg-black/30 border border-white/10 p-5 rounded-2xl shadow-inner mb-8">
        <div className="flex items-center gap-2 text-white/50 text-[11px] font-bold uppercase tracking-widest mb-3">
          <span>📖</span> 규정 해설
        </div>
        <p className="text-white/90 text-[15px] leading-relaxed font-medium break-keep">{result?.rule}</p>
      </div>

      <button onClick={() => dispatch({ type: "NEXT_EVENT" })}
        className="w-full py-4 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl font-bold text-lg shadow-lg transition-transform active:scale-95 text-white mt-auto">
        {state.eventCount >= GAME_LENGTH ? "📊 최종 결과 확인" : "다음 상황으로 ➡️"}
      </button>
    </div>
  );
}

// =============================================
// 📺 화면 4: 엔딩
// =============================================
function EndingScreen({ state, dispatch }) {
  const ending = getEnding(state);
  const correctCount = state.eventHistory.filter((e) => e.correct).length;

  useEffect(() => {
    playSound(ending.sound);
    if (ending.type === "master") {
      setTimeout(() => playSound("success"), 600);
      setTimeout(() => playSound("success"), 1200);
    }
  }, []);

  return (
    <div className="flex flex-col items-center justify-center text-center text-white h-full" style={{ animation: "popup 0.6s ease-out" }}>
      
      <div className="text-[10px] font-bold tracking-widest uppercase bg-black/40 px-4 py-1.5 rounded-full mb-6 border border-white/10 text-white/60">
        훈련 종료
      </div>
      
      <div className="text-7xl mb-4 drop-shadow-2xl" style={{ animation: "float 3s infinite" }}>{ending.emoji}</div>
      <h1 className={`text-3xl font-black mb-2 tracking-tight ${ending.textColor} drop-shadow-md`}>{ending.title}</h1>
      <p className={`font-bold mb-6 text-[15px] ${ending.accentColor}`}>{ending.subtitle}</p>
      
      <div className="bg-black/30 w-full p-5 rounded-2xl grid grid-cols-2 gap-4 mb-6 border border-white/10 shadow-inner">
        <div>
          <div className="text-[11px] text-white/50 font-bold uppercase tracking-wider mb-1">정답률</div>
          <div className={`text-3xl font-black ${correctCount === GAME_LENGTH ? 'text-yellow-400' : 'text-white'}`}>
            {correctCount} <span className="text-lg text-white/30">/ {GAME_LENGTH}</span>
          </div>
        </div>
        <div>
          <div className="text-[11px] text-white/50 font-bold uppercase tracking-wider mb-1">이해도</div>
          <div className="text-3xl font-black text-emerald-400">{state.understandingScore}<span className="text-lg text-emerald-400/50">%</span></div>
        </div>
      </div>

      <p className="text-sm text-white/80 mb-8 break-keep leading-relaxed px-2">
        {ending.description}
      </p>

      <div className="flex gap-3 w-full mt-auto">
        <button onClick={() => dispatch({ type: "RESTART" })}
          className="flex-1 py-4 bg-gradient-to-r from-emerald-500 to-green-500 hover:from-emerald-400 hover:to-green-400 text-gray-900 rounded-xl font-black transition-transform active:scale-95 shadow-lg shadow-emerald-900/50">
          🔄 다시 도전
        </button>
        <button onClick={() => window.location.reload()}
          className="flex-1 py-4 bg-white/10 hover:bg-white/20 border border-white/20 text-white rounded-xl font-bold transition-transform active:scale-95 shadow-lg">
          포지션 변경
        </button>
      </div>
    </div>
  );
}

// =============================================
// 🎮 메인 렌더링 컨테이너
// =============================================
function App() {
  const [state, dispatch] = useReducer(gameReducer, initialState);
  
  // 동적 배경색 처리 (엔딩 시 배경색 변경)
  let bgClass = "from-[#0b2e13] to-[#1a5a29]"; 
  if (state.gamePhase === 'ending') {
    const ending = getEnding(state);
    bgClass = ending.bg;
  }

  return (
    <div className={`min-h-screen w-full relative flex items-center justify-center overflow-hidden bg-gradient-to-br ${bgClass} transition-colors duration-1000`} style={{ fontFamily: "'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif" }}>
      <PitchBackground />
      
      {/* 반투명 글래스 컨테이너 */}
      <div className="z-10 w-full max-w-md h-[100vh] sm:h-auto sm:min-h-[800px] p-6 bg-white/10 backdrop-blur-md sm:rounded-3xl border-y sm:border border-white/20 shadow-2xl relative overflow-y-auto">
        {state.gamePhase === "intro" && <IntroScreen state={state} dispatch={dispatch} />}
        {state.gamePhase === "game" && <GameScreen state={state} dispatch={dispatch} />}
        {state.gamePhase === "result" && <ResultScreen state={state} dispatch={dispatch} />}
        {state.gamePhase === "ending" && <EndingScreen state={state} dispatch={dispatch} />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
